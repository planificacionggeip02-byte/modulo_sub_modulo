<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Ventas</title>
<style>
        /* --- ESTILOS PARA OCULTAR PANTALLA DE CARGA --- */
        #loading, #cargando, .loading, .loader, #preloader, .overlay {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
        }

        /* --- ESTILOS ORIGINALES DEL DASHBOARD --- */
        body { margin: 0; font-family: Arial, sans-serif; background: #f4f6f9; }
        
        #contenedor-ventas-dash { padding: 10px 20px; }

        .seccion-dash { background: #ffffff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 20px; border: 1px solid #dee2e6; }
        .titulo-seccion { font-size: 0.95rem; font-weight: bold; color: #1a2b4c; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        /* --- SEGMENTADORES REDUCIDOS (NUEVO) --- */
        .form-control { 
            border-radius: 4px; 
            border: 1px solid #ced4da; 
            padding: 4px 8px; 
            font-size: 0.75rem; 
            width: 100%; 
            box-sizing: border-box;
            height: 28px; /* Más delgados */
        }

        .grid-filtros { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; /* Menos separación */
        }
        
        .filtro-group label { 
            font-size: 0.75rem; 
            font-weight: bold; 
            color: #666; 
            display: block; 
            margin-bottom: 3px; 
        }

        /* ========================================== */
        /* 📊 EMBUDO DE 7 CUADROS SLIM (ACTUALIZADO) */
        /* ========================================== */
        .grid-kpis-slim { 
            display: flex; 
            gap: 10px; 
            justify-content: space-between; 
            margin-bottom: 20px; 
            flex-wrap: nowrap; 
        }
        
        .kpi-card-mini {
            background: #1a2b4c; 
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 10px 5px;
            flex: 1; 
            text-align: center;
            min-width: 0; 
            position: relative; 
            
            /* --- SOMBRA ELEGANTE --- */
            /* 0px horizontal, 4px vertical, 8px de desenfoque, color negro con 20% opacidad */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); 
            
            /* Opcional: efecto suave al pasar el mouse */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        /* Efecto extra: cuando pasas el mouse, la sombra crece un poco */
        .kpi-card-mini:hover {
            transform: translateY(-2px); /* El cuadro sube un poquito */
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }

        /* Estilos de los Títulos de los Cuadros (Negrita + Tamaño 0.80rem) */
        .kpi-title {
            color: #ffffff;
            font-size: 0.80rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .kpi-valor {
            color: #ffffff;
            font-size: 1.4rem;
            font-weight: bold;
            margin: 0;
        }

        /* Colores específicos del embudo */
        .kpi-total { background: #ffffff; border: 2px solid #1a2b4c; }
        .kpi-total .kpi-title { color: #1a2b4c; }
        .kpi-total .kpi-valor { color: #1a2b4c; }

        .kpi-demanda { background: #f8f9fa; border: 1px solid #adb5bd; }
        .kpi-demanda .kpi-title { color: #495057; }
        .kpi-demanda .kpi-valor { color: #212529; }

        .kpi-proceso { background: #008080; } 
        .kpi-exito { background: #e91e63; } 
        .kpi-perdida { background: #6c757d; } 

        .kpi-conversion-badge {
            position: absolute; 
            bottom: 4px; 
            right: 6px; 
            font-size: 0.65rem; 
            color: #00ff88; 
            font-weight: bold;
        }

        /* --- RESTO DEL MAPA --- */
        .mapa-gigante-container { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: transparent; 
            position: relative; 
            overflow: hidden; 
        }
        
        #mapa-fiel { width: 100%; max-width: 800px; }
        #contenedor-svg-venezuela svg { width: 100%; height: auto; display: block; }

        #contenedor-svg-venezuela svg path {
            fill: #e9ecef !important; 
            stroke: #adb5bd !important;
            stroke-width: 1px !important;
            transition: fill 0.3s ease;
        }

        #contenedor-svg-venezuela svg path:hover {
            fill: #008080 !important;
            cursor: pointer;
        }
        
        #contenedor-svg-venezuela svg circle { display: none; }
</style>
</head>
<body>

<div id="contenedor-ventas-dash">

    <div class="seccion-dash">
        <div class="titulo-seccion">🔍 1. Segmentadores de Búsqueda</div>
        <div class="grid-filtros">
            <div class="filtro-group"><label>AÑO</label><select id="filtro-ano" class="form-control" onchange="aplicarFiltrosDash()"></select></div>
            <div class="filtro-group"><label>MES</label><select id="filtro-mes" class="form-control" onchange="aplicarFiltrosDash()"></select></div>
            <div class="filtro-group"><label>ESTATUS</label><select id="filtro-numero" class="form-control" onchange="aplicarFiltrosDash()"></select></div>
            <div class="filtro-group"><label>SITUACIÓN</label><select id="filtro-situacion" class="form-control" onchange="aplicarFiltrosDash()"></select></div>
            <div class="filtro-group"><label>REGIÓN</label><select id="filtro-region" class="form-control" onchange="aplicarFiltrosDash()"></select></div>
            <div class="filtro-group"><label>ESTADO</label><select id="filtro-estado" class="form-control" onchange="aplicarFiltrosDash()"></select></div>
            <div class="filtro-group"><label>HUELLA</label><select id="filtro-huella" class="form-control" onchange="aplicarFiltrosDash()"></select></div>
            <div class="filtro-group"><label>SECTOR</label><select id="filtro-sector" class="form-control" onchange="aplicarFiltrosDash()"></select></div>

        </div>
    </div>

    <div class="grid-kpis-slim">
        
        <div class="kpi-card-mini kpi-total">
            <div class="kpi-title">Total Estatus</div>
            <p class="kpi-valor" id="kpi-total-estatus">0</p>
        </div>

        <div class="kpi-card-mini kpi-demanda">
            <div class="kpi-title">Demanda</div>
            <p class="kpi-valor" id="kpi-demanda">0</p>
        </div>

        <div class="kpi-card-mini kpi-proceso">
            <div class="kpi-title">Construcción</div>
            <p class="kpi-valor" id="kpi-construccion">0</p>
        </div>

        <div class="kpi-card-mini kpi-proceso">
            <div class="kpi-title">Navegando</div>
            <p class="kpi-valor" id="kpi-navegando">0</p>
        </div>

        <div class="kpi-card-mini kpi-exito">
            <div class="kpi-title">Aceptación</div>
            <p class="kpi-valor" id="kpi-aceptacion">0</p>
            <div class="kpi-conversion-badge" id="kpi-conversion" title="Tasa de Conversión">0%</div>
        </div>

        <div class="kpi-card-mini kpi-perdida">
            <div class="kpi-title">Rechazada</div>
            <p class="kpi-valor" id="kpi-rechazada">0</p>
        </div>

        <div class="kpi-card-mini kpi-perdida">
            <div class="kpi-title">Retiro</div>
            <p class="kpi-valor" id="kpi-retiro">0</p>
        </div>

    </div>

    <div class="seccion-dash">
        <div class="titulo-seccion" style="display:flex; justify-content:space-between;">
            <span>🗺️ 2. Distribución Geográfica Nacional</span>
        </div>
        
        <div class="mapa-gigante-container">
            <div id="mapa-fiel">
                <div id="contenedor-svg-venezuela">

      n: document.getElementById('filtro-numero') ? document.getElementById('filtro-numero').value : "Todos", 
      r: document.getElementById('filtro-region') ? document.getElementById('filtro-region').value : "Todos",
      e: document.getElementById('filtro-estado') ? document.getElementById('filtro-estado').value : "Todos", 
      m: document.getElementById('filtro-mes') ? document.getElementById('filtro-mes').value : "Todos",
      a: document.getElementById('filtro-ano') ? document.getElementById('filtro-ano').value : "Todos", 
      h: document.getElementById('filtro-huella') ? document.getElementById('filtro-huella').value : "Todos",
      s: document.getElementById('filtro-sector') ? document.getElementById('filtro-sector').value : "Todos", 
      sit: document.getElementById('filtro-situacion') ? document.getElementById('filtro-situacion').value : "Todos"
    };

    dataFiltrada = dataOriginal.filter(function(item) {
      return (f.n === "Todos" || item.numero === f.n) && (f.r === "Todos" || item.region === f.r) &&
             (f.e === "Todos" || item.estado === f.e) && (f.m === "Todos" || item.mes === f.m) &&
             (f.a === "Todos" || item.ano === f.a) && (f.h === "Todos" || item.huella === f.h) &&
             (f.s === "Todos" || item.sector === f.s) && (f.sit === "Todos" || item.situacion === f.sit);
    });

    actualizarKPIs();
    renderizarDatosMapa();
    actualizarGraficos();
  }

  // --- AQUÍ ESTÁ EL CAMBIO CLAVE (LÓGICA PARA LOS 7 CUADROS) ---
  function actualizarKPIs() {
    const contar = (estatus) => {
        return dataFiltrada.filter(item => {
            let val = (item.numero || "").toString().trim().toLowerCase();
            return val === estatus.toLowerCase();
        }).length;
    };

    // 1. Total Estatus (Ignora los vacíos)
    let totalEstatus = dataFiltrada.filter(item => (item.numero || "").toString().trim() !== "").length;

    // 2. Conteos específicos
    let demanda = contar("Demanda");
    let aceptacion = contar("Aceptación"); 
    let rechazada = contar("Aceptación Rechazada");
    let navegando = contar("Navegando");
    let retiro = contar("Retiro");
    let construccion = contar("Construcción");

    // 3. Cálculo de conversión basado en esos dos números
    let conversion = (demanda > 0) ? ((aceptacion / demanda) * 100).toFixed(1) : 0;

    // Asignación a las tarjetas
    if(document.getElementById('kpi-total-estatus')) document.getElementById('kpi-total-estatus').textContent = totalEstatus;
    if(document.getElementById('kpi-demanda')) document.getElementById('kpi-demanda').textContent = demanda;
    if(document.getElementById('kpi-aceptacion')) document.getElementById('kpi-aceptacion').textContent = aceptacion;
    if(document.getElementById('kpi-rechazada')) document.getElementById('kpi-rechazada').textContent = rechazada;
    if(document.getElementById('kpi-navegando')) document.getElementById('kpi-navegando').textContent = navegando;
    if(document.getElementById('kpi-retiro')) document.getElementById('kpi-retiro').textContent = retiro;
    if(document.getElementById('kpi-construccion')) document.getElementById('kpi-construccion').textContent = construccion;
    if(document.getElementById('kpi-conversion')) document.getElementById('kpi-conversion').textContent = conversion + "%";
  }

  // ==========================================
  // 🗺️ RENDERIZADO PRO: Máxima claridad y separación
  // ==========================================
  function renderizarDatosMapa() {
    var conteoPorEstado = {};
    
    dataFiltrada.forEach(function(item) { 
        // Solo contamos para el mapa si el campo "Numero" no está vacío
        if(item.estado && item.numero && item.numero.toString().trim() !== "") {
            var estadoDB = item.estado.toString().toLowerCase().trim();
            if(estadoDB === "vargas") estadoDB = "la guaira";
            conteoPorEstado[estadoDB] = (conteoPorEstado[estadoDB] || 0) + 1; 
        }
    });

    // CONFIGURACIÓN DE LÍNEAS PARA ESTADOS PEQUEÑOS (Salen al mar)
    var ajustesEspeciales = {
        "distrito capital": [0, -90],
        "la guaira": [0, -50],
        "nueva esparta": [0, -60],
        "carabobo": [0, -100],
        "aragua": [0, -130],
        "yaracuy": [0, -70]
    };

    LISTA_ESTADOS.forEach(function(estado) {
      var circulo = document.querySelector('circle[class="' + estado + '"]');
      if (!circulo) return;

      var estadoBusqueda = estado.toLowerCase().trim();
      var total = conteoPorEstado[estadoBusqueda] || 0;
      var idBase = estadoBusqueda.replace(/\s/g, "");
      
      // Limpiar etiquetas previas
      if (document.getElementById("txt-nombre-" + idBase)) document.getElementById("txt-nombre-" + idBase).remove();
      if (document.getElementById("txt-numero-" + idBase)) document.getElementById("txt-numero-" + idBase).remove();
      if (document.getElementById("line-" + idBase)) document.getElementById("line-" + idBase).remove();

      if (total > 0) {
        // --- ESTILO DEL PUNTO (EL PIN) ---
        circulo.style.display = "block"; 
        circulo.style.fill = "#e91e63"; 
        circulo.setAttribute("r", "5"); 
        circulo.style.cursor = "pointer";
        circulo.style.pointerEvents = "all";

        var cx = parseFloat(circulo.getAttribute("cx"));
        var cy = parseFloat(circulo.getAttribute("cy"));

        var ajuste = ajustesEspeciales[estadoBusqueda];
        var posX, posY;

        if (ajuste) {
            // --- LÓGICA PARA ESTADOS CON LÍNEA (COSTA) ---
            var targetX = cx + ajuste[0];
            var targetY = cy + ajuste[1];

            var linea = document.createElementNS("http://www.w3.org/2000/svg", "line");
            linea.setAttribute("id", "line-" + idBase);
            linea.setAttribute("x1", cx); linea.setAttribute("y1", cy);
            linea.setAttribute("x2", targetX); linea.setAttribute("y2", targetY);
            linea.setAttribute("stroke", "#adb5bd"); linea.setAttribute("stroke-width", "1");
            linea.setAttribute("stroke-dasharray", "3,3");
            circulo.parentNode.insertBefore(linea, circulo);

            posX = targetX;
            posY = targetY;
        } else {
            // --- LÓGICA PARA ESTADOS GRANDES (INTERNOS) ---
            // Ponemos el texto 25 píxeles arriba del punto para que no se pegue
            posX = cx;
            posY = cy - 25; 
        }

        // --- BLOQUE DE TEXTO UNIFICADO ---
        
        // 1. NOMBRE (Arriba) - Usando tus 16px
        var etNombre = document.createElementNS("http://www.w3.org/2000/svg", "text");
        etNombre.setAttribute("id", "txt-nombre-" + idBase);
        etNombre.setAttribute("x", posX);
        etNombre.setAttribute("y", posY - 5); 
        etNombre.setAttribute("fill", "#1a2b4c"); 
        etNombre.setAttribute("font-size", "16px");
        etNombre.setAttribute("font-weight", "bold");
        etNombre.setAttribute("text-anchor", "middle"); 
        etNombre.style.pointerEvents = "none";
        etNombre.textContent = estado;
        circulo.parentNode.appendChild(etNombre);

        // 2. NÚMERO (Justo abajo del nombre) - Usando tus 14px
        var etNumero = document.createElementNS("http://www.w3.org/2000/svg", "text");
        etNumero.setAttribute("id", "txt-numero-" + idBase);
        etNumero.setAttribute("x", posX);
        // Ajuste milimétrico a +14 para que no choque con la fuente de 16px de arriba
        etNumero.setAttribute("y", posY + 14); 
        etNumero.setAttribute("fill", "#e91e63"); 
        etNumero.setAttribute("font-size", "14px");
        etNumero.setAttribute("font-weight", "bold");
        etNumero.setAttribute("text-anchor", "middle");
        etNumero.style.pointerEvents = "none";
        etNumero.textContent = total;
        circulo.parentNode.appendChild(etNumero);

        // --- TOOLTIP ---
        circulo.onmouseover = function(e) { mostrarTooltip(e, estado, total); };
        circulo.onmousemove = function(e) { moverTooltip(e); };
        circulo.onmouseout = ocultarTooltip;

      } else {
        circulo.style.display = "none";
      }
    });
  }

  // --- FUNCIONES DEL TOOLTIP (EL CUADRO AZUL) ---
  function mostrarTooltip(e, estado, total) {
    var tooltipEl = document.getElementById('tooltip-mapa');
    if(!tooltipEl) return;
    document.getElementById('tt-estado').textContent = estado;
    document.getElementById('tt-numero').textContent = total;
    tooltipEl.style.opacity = "1";
    moverTooltip(e);
  }

  function moverTooltip(e) {
    var tooltipEl = document.getElementById('tooltip-mapa');
    if(tooltipEl) {
        tooltipEl.style.left = (e.pageX + 15) + 'px';
        tooltipEl.style.top = (e.pageY + 15) + 'px';
    }
  }
  
  function ocultarTooltip() { 
    var tooltipEl = document.getElementById('tooltip-mapa');
    if(tooltipEl) tooltipEl.style.opacity = "0"; 
  }

  function actualizarGraficos() {
    // Aquí iría tu lógica de Chart.js si la tienes
  }

  cargarDataOriginal();

  // Seguro para quitar pantalla de carga
  setTimeout(function() {
      var IDs = ['loading', 'cargando', 'loader', 'preloader'];
      IDs.forEach(function(id) { var el = document.getElementById(id); if (el) el.style.display = 'none'; });
      var overlays = document.querySelectorAll('.loading, .loader, .overlay, .cargando');
      overlays.forEach(function(el) { el.style.display = 'none'; });
  }, 2000);
</script>
