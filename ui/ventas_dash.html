<script>
  // =========================================================
  // 🧠 LÓGICA DEL DASHBOARD: CONEXIÓN AL SERVIDOR
  // =========================================================
  let dataOriginal = [];

  function cargarDataOriginal() {
    console.log("📡 Iniciando carga de datos del Dashboard...");
    
    // 1. Encendemos el loader (Acción pensante)
    if (typeof mostrarLoader === "function") {
      mostrarLoader();
    } else {
      console.warn("⚠️ Función mostrarLoader no encontrada");
    }

    // 2. Solicitud al servidor (main.gs)
    google.script.run
      .withSuccessHandler(function(res) {
        // 3. Apagamos el loader al recibir respuesta (¡Esto quita el cargando!)
        if (typeof ocultarLoader === "function") ocultarLoader();

        if (res.ok) {
          console.log("✅ Data recibida con éxito:", res.records.length, "registros");
          dataOriginal = res.records;
          
          if (dataOriginal.length === 0) {
            if (typeof mostrarToast === "function") mostrarToast("No hay datos para mostrar", "info");
            return;
          }

          // Nota: Aquí programaremos el llenado de filtros y gráficos en el siguiente paso

        } else {
          console.error("❌ Error en el servidor:", res.error);
          if (typeof mostrarToast === "function") mostrarToast("Error en la data: " + res.error, "error");
        }
      })
      .withFailureHandler(function(err) {
        // 4. Apagamos el loader incluso si hay un error crítico
        if (typeof ocultarLoader === "function") ocultarLoader();
        console.error("❌ Error crítico de conexión:", err);
        if (typeof mostrarToast === "function") mostrarToast("Error de conexión", "error");
      })
      .getVentasDashData(); // Llama a la función que pegaste en main.gs
  }

  // 5. Ejecutar la función automáticamente al cargar este sub-módulo.
  // Usamos un pequeño delay para asegurar que el HTML ya esté pintado en la pantalla.
  setTimeout(cargarDataOriginal, 300);

</script>
