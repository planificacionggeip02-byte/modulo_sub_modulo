<div id="contenedor-ventas-dash" style="padding: 10px 20px;">

  <style>
    /* ==========================================
       🎨 ESTILOS GENERALES Y FILAS
       ========================================== */
    .seccion-dash { background: #ffffff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 20px; margin-bottom: 20px; border: 1px solid #dee2e6; }
    .titulo-seccion { font-size: 0.95rem; font-weight: bold; color: #1a2b4c; text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .form-control { border-radius: 4px; border: 1px solid #ced4da; padding: 6px 10px; font-size: 0.85rem; width: 100%; }

    /* FILA 1: FILTROS */
    .grid-filtros { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    .filtro-group label { font-size: 0.75rem; font-weight: bold; color: #666; display: block; margin-bottom: 5px; }

    /* FILA 2: KPIs */
    .grid-kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
    .kpi-card { padding: 20px; border-radius: 8px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
    .kpi-navy { background: #1a2b4c; color: white; }
    .kpi-teal { background: #008080; color: white; }
    .kpi-light { background: #ffffff; color: #1a2b4c; border: 2px solid #008080; }
    .kpi-valor { margin: 5px 0 0 0; font-size: 2.2rem; font-weight: bold; }

    /* FILA 3: MAPA (SILUETAS REALES) */
    .mapa-gigante-container { width: 100%; height: 550px; display: flex; justify-content: center; align-items: center; background: #f8f9fa; border-radius: 8px; position: relative; overflow: hidden; }
    #mapa-svg { width: 100%; height: 100%; max-width: 900px; }
    
    /* Fronteras Reales */
    .zona-estado { fill: #e5e7eb; stroke: #ffffff; stroke-width: 1.5px; cursor: pointer; transition: all 0.2s ease; }
    .zona-estado:hover { fill: #b3e0e0; stroke: #008080; }
    .zona-activa { fill: rgba(0, 128, 128, 0.4) !important; stroke: #008080 !important; stroke-width: 2px !important; }
    
    /* Números y Callouts */
    .numero-mapa { font-family: 'Segoe UI', sans-serif; font-size: 16px; font-weight: 900; fill: #1a2b4c; pointer-events: none; text-anchor: middle; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }
    .numero-cero { fill: #a0aec0; font-size: 13px; font-weight: normal; }
    .numero-destacado { fill: #e91e63; font-size: 18px; } 
    .linea-callout { stroke: #a0aec0; stroke-width: 1.2; stroke-dasharray: 2, 2; pointer-events: none; }

    /* Tooltip */
    #tooltip-mapa { position: absolute; background: rgba(26, 43, 76, 0.95); color: white; padding: 10px 15px; border-radius: 6px; font-size: 0.85rem; pointer-events: none; opacity: 0; transition: opacity 0.2s ease; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

    /* FILA 4: GRÁFICOS */
    .grid-graficos { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  </style>

  <div class="seccion-dash">
    <div class="titulo-seccion">🔍 1. Segmentadores de Búsqueda</div>
    <div class="grid-filtros">
      <div class="filtro-group"><label>ESTATUS</label><select id="filtro-numero" class="form-control" onchange="aplicarFiltrosDash()"></select></div>
      <div class="filtro-group"><label>REGIÓN</label><select id="filtro-region" class="form-control" onchange="aplicarFiltrosDash()"></select></div>
      <div class="filtro-group"><label>ESTADO</label><select id="filtro-estado" class="form-control" onchange="aplicarFiltrosDash()"></select></div>
      <div class="filtro-group"><label>MES</label><select id="filtro-mes" class="form-control" onchange="aplicarFiltrosDash()"></select></div>
      <div class="filtro-group"><label>AÑO</label><select id="filtro-ano" class="form-control" onchange="aplicarFiltrosDash()"></select></div>
      <div class="filtro-group"><label>HUELLA</label><select id="filtro-huella" class="form-control" onchange="aplicarFiltrosDash()"></select></div>
      <div class="filtro-group"><label>SECTOR</label><select id="filtro-sector" class="form-control" onchange="aplicarFiltrosDash()"></select></div>
      <div class="filtro-group"><label>SITUACIÓN</label><select id="filtro-situacion" class="form-control" onchange="aplicarFiltrosDash()"></select></div>
    </div>
  </div>

  <div class="grid-kpis">
    <div class="kpi-card kpi-navy"><small>TOTAL DEMANDA</small><h2 id="kpi-total" class="kpi-valor">0</h2></div>
    <div class="kpi-card kpi-teal"><small>ACEPTACIONES</small><h2 id="kpi-aceptacion" class="kpi-valor">0</h2></div>
    <div class="kpi-card kpi-light"><small>% CONVERSIÓN</small><h2 id="kpi-conversion" class="kpi-valor">0%</h2></div>
  </div>

  <div class="seccion-dash">
    <div class="titulo-seccion">🗺️ 2. Distribución Geográfica Nacional</div>
    <div class="mapa-gigante-container" id="contenedor-svg-venezuela">
      <div id="tooltip-mapa">
        <strong id="tt-estado" style="color:#00e5ff; display:block; margin-bottom:5px;">Estado</strong>
        Total: <span id="tt-numero" style="font-weight:bold;">0</span>
      </div>
    </div>
  </div>

  <div class="grid-graficos">
    <div class="seccion-dash" style="margin-bottom:0;"><div class="titulo-seccion">📊 Estatus (Dona)</div><canvas id="chart-estatus" height="220"></canvas></div>
    <div class="seccion-dash" style="margin-bottom:0;"><div class="titulo-seccion">📈 Evolución (Barras)</div><canvas id="chart-evolucion" height="220"></canvas></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  // === VARIABLES GLOBALES (REGLA VAR) ===
  var dataOriginal = dataOriginal || [];
  var dataFiltrada = dataFiltrada || [];
  var chartEstatus = null;
  var chartEvolucion = null;
  
  var REGIONES_MAP = {
    "Andes": ["Mérida", "Táchira", "Trujillo"],
    "Capital": ["Distrito Capital", "Miranda", "Vargas"],
    "Centro": ["Aragua", "Carabobo"],
    "Guayana": ["Amazonas", "Bolívar", "Delta Amacuro"],
    "Los Llanos": ["Apure", "Barinas", "Cojedes", "Guárico", "Portuguesa"],
    "Occidente": ["Falcón", "Lara", "Yaracuy", "Zulia"],
    "Oriente": ["Anzoátegui", "Monagas", "Nueva Esparta", "Sucre"]
  };

  // Coordenadas ajustadas para el mapa real
  var CONFIG_MAPA = {
    "Amazonas": { x: 310, y: 500 },
    "Anzoátegui": { x: 430, y: 220 },
    "Apure": { x: 260, y: 310 },
    "Aragua": { x: 310, y: 155, callout: { cx: 270, cy: 165 } },
    "Barinas": { x: 180, y: 255 },
    "Bolívar": { x: 460, y: 380 },
    "Carabobo": { x: 280, y: 145 },
    "Cojedes": { x: 260, y: 200 },
    "Delta Amacuro": { x: 535, y: 255 },
    "Distrito Capital": { x: 320, y: 110, callout: { cx: 370, cy: 75 } },
    "Falcón": { x: 195, y: 105 },
    "Guárico": { x: 335, y: 245 },
    "Lara": { x: 195, y: 165 },
    "Mérida": { x: 140, y: 235 },
    "Miranda": { x: 355, y: 165 },
    "Monagas": { x: 495, y: 195 },
    "Nueva Esparta": { x: 475, y: 65, callout: { cx: 520, cy: 45 } },
    "Portuguesa": { x: 215, y: 215 },
    "Sucre": { x: 485, y: 115 },
    "Táchira": { x: 105, y: 285 },
    "Trujillo": { x: 155, y: 195 },
    "Vargas": { x: 325, y: 100, callout: { cx: 350, cy: 50 } },
    "Yaracuy": { x: 245, y: 145 },
    "Zulia": { x: 105, y: 155 }
  };

  function cargarDataOriginal() {
    if (typeof mostrarLoader === "function") mostrarLoader();
    google.script.run
      .withSuccessHandler(function(res) {
        if (typeof ocultarLoader === "function") ocultarLoader();
        if (res.ok) {
          dataOriginal = res.records;
          dataFiltrada = [...dataOriginal];
          inicializarFiltros();
          pintarMapaLimpio(); 
          aplicarFiltrosDash();
        }
      })
      .getVentasDashData();
  }

  function inicializarFiltros() {
    var campos = {'filtro-numero':'numero','filtro-region':'region','filtro-estado':'estado','filtro-mes':'mes','filtro-ano':'ano','filtro-huella':'huella','filtro-sector':'sector','filtro-situacion':'situacion'};
    for (var id in campos) {
      var select = document.getElementById(id);
      if (!select) continue;
      var campo = campos[id];
      var valoresUnicos = [];
      dataOriginal.forEach(function(item) { if (item[campo] && valoresUnicos.indexOf(item[campo]) === -1) valoresUnicos.push(item[campo]); });
      valoresUnicos.sort();
      select.innerHTML = '<option value="Todos">-- TODOS --</option>';
      valoresUnicos.forEach(function(v) { select.innerHTML += '<option value="' + v + '">' + v + '</option>'; });
    }
  }

  function aplicarFiltrosDash() {
    var f = {
      n: document.getElementById('filtro-numero').value, r: document.getElementById('filtro-region').value,
      e: document.getElementById('filtro-estado').value, m: document.getElementById('filtro-mes').value,
      a: document.getElementById('filtro-ano').value, h: document.getElementById('filtro-huella').value,
      s: document.getElementById('filtro-sector').value, sit: document.getElementById('filtro-situacion').value
    };

    dataFiltrada = dataOriginal.filter(function(item) {
      return (f.n === "Todos" || item.numero === f.n) && (f.r === "Todos" || item.region === f.r) &&
             (f.e === "Todos" || item.estado === f.e) && (f.m === "Todos" || item.mes === f.m) &&
             (f.a === "Todos" || item.ano === f.a) && (f.h === "Todos" || item.huella === f.h) &&
             (f.s === "Todos" || item.sector === f.s) && (f.sit === "Todos" || item.situacion === f.sit);
    });

    actualizarKPIs();
    renderizarDatosMapa(f.r);
    actualizarGraficos();
  }

  function actualizarKPIs() {
    var total = dataFiltrada.length;
    var aceptados = dataFiltrada.filter(function(item) { return item.numero && item.numero.toString().toLowerCase().indexOf("aceptaci") !== -1; }).length;
    document.getElementById('kpi-total').textContent = total;
    document.getElementById('kpi-aceptacion').textContent = aceptados;
    document.getElementById('kpi-conversion').textContent = (total > 0 ? ((aceptados / total) * 100).toFixed(1) : 0) + "%";
  }

  // --- 🗺️ MAPA ---
  function pintarMapaLimpio() {
  var contenedor = document.getElementById('contenedor-svg-venezuela');
  // Ajustamos el viewBox para que el mapa REAL se centre y no se vea cortado
  var svgHTML = '<svg id="mapa-svg" viewBox="0 0 650 600" xmlns="http://www.w3.org/2000/svg" style="width:100%; height:100%;">';
  
  // 1. Dibujamos las siluetas reales del mapa_data
  for (var estado in VENEZUELA_PATHS) {
    var d = VENEZUELA_PATHS[estado];
    var idLimpio = estado.replace(/\s/g, '-');
    svgHTML += '<path id="path-' + idLimpio + '" d="' + d + '" class="zona-estado" onmousemove="mostrarTooltip(event, \''+estado+'\')" onmouseout="ocultarTooltip()" />';
  }
  
  // 2. Dibujamos los Números y Callouts (usando tus coordenadas validadas)
  for (var estado in CONFIG_MAPA) {
    var conf = CONFIG_MAPA[estado];
    var idLimpio = estado.replace(/\s/g, '-');
    var textX = conf.callout ? conf.callout.cx : conf.x;
    var textY = conf.callout ? conf.callout.cy : conf.y;

    if (conf.callout) {
      svgHTML += '<line x1="'+conf.x+'" y1="'+conf.y+'" x2="'+conf.callout.cx+'" y2="'+conf.callout.cy+'" class="linea-callout" />';
    }

    svgHTML += '<text x="'+textX+'" y="'+(textY - 12)+'" style="font-size:10px; fill:#1a2b4c; font-weight:bold; text-anchor:middle; pointer-events:none;">'+estado.substring(0,3).toUpperCase()+'</text>';
    svgHTML += '<text id="count-'+idLimpio+'" x="'+textX+'" y="'+(textY + 5)+'" class="numero-mapa numero-cero">0</text>';
  }
  
  svgHTML += '</svg>';
  contenedor.innerHTML = svgHTML;
}

  function renderizarDatosMapa(regionActiva) {
    var conteoPorEstado = {};
    dataFiltrada.forEach(function(item) { conteoPorEstado[item.estado] = (conteoPorEstado[item.estado] || 0) + 1; });
    for (var estado in CONFIG_MAPA) {
      var idLimpio = estado.replace(/\s/g, '-');
      var txt = document.getElementById('count-' + idLimpio);
      var zona = document.getElementById('path-' + idLimpio);
      if (!txt || !zona) continue;
      var total = conteoPorEstado[estado] || 0;
      txt.textContent = total;
      txt.setAttribute("class", total > 0 ? "numero-mapa numero-destacado" : "numero-mapa numero-cero");
      if (regionActiva !== "Todos" && REGIONES_MAP[regionActiva] && REGIONES_MAP[regionActiva].indexOf(estado) !== -1) {
        zona.setAttribute("class", "zona-estado zona-activa");
      } else {
        zona.setAttribute("class", "zona-estado");
      }
      zona.setAttribute("data-total", total);
    }
  }

  // --- 📈 GRÁFICOS ---
  function actualizarGraficos() {
    // Estatus
    var ctxE = document.getElementById('chart-estatus').getContext('2d');
    var cE = {}; dataFiltrada.forEach(function(i){ var e = i.numero || "S/E"; cE[e] = (cE[e]||0)+1; });
    if(chartEstatus) chartEstatus.destroy();
    chartEstatus = new Chart(ctxE, { type: 'doughnut', data: { labels: Object.keys(cE), datasets: [{ data: Object.values(cE), backgroundColor: ['#1a2b4c','#008080','#e91e63','#a0aec0'] }] }, options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });

    // Evolución
    var ctxV = document.getElementById('chart-evolucion').getContext('2d');
    var cV = {}; dataFiltrada.forEach(function(i){ var m = i.mes || "S/M"; cV[m] = (cV[m]||0)+1; });
    if(chartEvolucion) chartEvolucion.destroy();
    chartEvolucion = new Chart(ctxV, { type: 'bar', data: { labels: Object.keys(cV), datasets: [{ label: 'Registros', data: Object.values(cV), backgroundColor: '#008080' }] }, options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true } } } });
  }

  // TOOLTIP
  var tooltip = document.getElementById('tooltip-mapa');
  function mostrarTooltip(e, estado) {
    document.getElementById('tt-estado').textContent = estado;
    document.getElementById('tt-numero').textContent = e.target.getAttribute("data-total") || "0";
    tooltip.style.opacity = "1";
    var rect = document.getElementById('contenedor-svg-venezuela').getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
    tooltip.style.top = (e.clientY - rect.top + 15) + 'px';
  }
  function ocultarTooltip() { tooltip.style.opacity = "0"; }

  cargarDataOriginal();
</script>
