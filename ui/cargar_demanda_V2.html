  // ============================
  // 🔧 UTILIDADES DE NORMALIZACIÓN
  // ============================
  function toNombrePropio(str) {
    if (!str) return "";
    return str
      .toLowerCase()
      .split(/\s+/)
      .map(w => w.charAt(0).toUpperCase() + w.slice(1))
      .join(" ");
  }

  function normalizeKey(str) {
    return (str || "")
      .toString()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-zA-Z0-9_]/g, "")
      .toLowerCase();
  }

  function soloDigitos(str, lenExacta) {
    const clean = (str || "").replace(/\D/g, "");
    return lenExacta ? (clean.length === lenExacta ? clean : null) : clean;
  }

  function formatearMonto(montoStr) {
    let s = (montoStr || "").trim();
    if (!s) return "0,00";
    s = s.replace(/\./g, "").replace(/\s+/g, "");
    s = s.replace(/,/g, ".");
    const n = parseFloat(s);
    if (isNaN(n)) return "0,00";
    const fixed = n.toFixed(2);
    const [enteros, decimales] = fixed.split(".");
    const enterosConMiles = enteros.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    return `${enterosConMiles},${decimales}`;
  }

  function normalizarRIF(input) {
    const s = (input || "").trim().toUpperCase().replace(/[\s-]/g, "");
    if (!/^[JVE]/.test(s)) return null;
    const letra = s.charAt(0);
    const digitos = s.slice(1).replace(/\D/g, "");
    if (digitos.length === 0 || digitos.length > 9) return null;
    const padded = digitos.padEnd(9, "0");
    return `${letra}${padded}`;
  }

  function validarCentral(input) {
    const s = (input || "").trim().toUpperCase();
    if (/^\d{4}$/.test(s)) return s;
    if (/^\d{4}[A-Z]$/.test(s)) return s;
    return null;
  }

  function concatCodTelefono(cod, tel7) {
    const t = (tel7 || "").replace(/\D/g, "");
    if (!cod || t.length !== 7) return null;
    return `${cod}${t}`;
  }

  function concatCod3Tel7(cod3, tel7) {
    const c = (cod3 || "").replace(/\D/g, "");
    const t = (tel7 || "").replace(/\D/g, "");
    if (c.length !== 3 || t.length !== 7) return null;
    return `${c}${t}`;
  }

  function validarEmailNoCantv(email) {
    const e = (email || "").trim();
    if (!e) return null;
    const cantv = /@cantv(\.com)?\.ve$/i;
    if (cantv.test(e)) return null;
    const basic = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return basic.test(e) ? e : null;
  }

  function crearCampoTextarea(label, name, requerido = false, extraClass = "") {
  const div = document.createElement("div");
  div.className = "campo";

  // ✅ Si viene una clase extra, la agregamos
  if (extraClass) div.classList.add(extraClass);

  const lbl = document.createElement("label");
  lbl.textContent = label;
  lbl.setAttribute("for", name);

  const textarea = document.createElement("textarea");
  textarea.id = name;
  textarea.name = name;
  textarea.rows = 4;
  textarea.className = "input-textarea";
  textarea.style.width = "100%";
  textarea.style.resize = "none";
  textarea.maxLength = 250;

  if (requerido) textarea.required = true;

  // ✅ Contador dinámico
  const contador = document.createElement("div");
  contador.className = "contador-caracteres";
  contador.textContent = "Máximo 250 caracteres — Quedan 250";

  textarea.addEventListener("input", () => {
    const restante = 250 - textarea.value.length;
    const btn = document.getElementById("btn-enviar-demanda");

    if (restante >= 0) {
      contador.textContent = `Máximo 250 caracteres — Quedan ${restante}`;
      if (btn) btn.disabled = false;
    } else {
      contador.textContent = `Has excedido el límite por ${Math.abs(restante)} caracteres`;
      if (btn) btn.disabled = true;
    }
  });

  div.appendChild(lbl);
  div.appendChild(textarea);
  div.appendChild(contador);

  return div;
}

        if (el.tagName === "SELECT") el.selectedIndex = 0;
        else if (el.type === "checkbox" || el.type === "radio") el.checked = false;
        else el.value = "";

        el.classList.remove("valido", "invalido", "is-invalid", "is-valid", "error", "success");
        el.removeAttribute("aria-invalid");
        el.style.border = ""; // por si hay estilo inline

      form.querySelectorAll(
        ".form-group, .campo, .campo-telefono, .grupo-telefono, .grupo-cod, .bloque-cod"
      ).forEach(w => {
        w.classList.remove("valido", "invalido", "is-invalid", "is-valid", "has-error", "has-success");
        w.removeAttribute("aria-invalid");
      });

      // 2b) Limpiar wrappers internos de Teléfono (telefono-group)

        "input[name='telefono'], input[name='telefono1'], input[name='telefono2'], input[name='telefono3'], [data-field='telefono'] input"
      );

    }

    // ============================

      console.log("✅ reInicializarFormulario(): fin");

// 📨 ENVÍO DEL FORMULARIO (validación + normalización) y TOAST
// ============================
function mostrarToast(msg, tipo = "success") {
  const cont = document.getElementById("contenedor-formulario");
  if (!cont) { alert(msg); return; }

  const overlay = document.createElement("div");
  overlay.className = "cd-overlay";
  Object.assign(overlay.style, {
    position: "fixed",
    top: "0", left: "0",
    width: "100%", height: "100%",
    background: "rgba(0,0,0,0.4)",
    zIndex: 9998
  });
  document.body.appendChild(overlay);

  const t = document.createElement("div");
  t.className = `cd-toast ${tipo}`;
  t.textContent = msg;
  Object.assign(t.style, {
    position: "fixed",
    top: "50%", left: "50%",
    transform: "translate(-50%, -50%)",
    zIndex: 9999,
    background: tipo === "success" ? "var(--color-primary)" : "#b00020",
    color: "#fff",
    padding: "20px 28px",
    fontSize: "1.6rem",
    fontWeight: "700",
    borderRadius: "12px",
    border: "1px solid #00FF7F",
    boxShadow: "0 0 12px #00FF7F",
    opacity: "1",
    transition: "opacity 0.4s ease",
    textAlign: "center"
  });
  document.body.appendChild(t);

setTimeout(() => {
    t.remove();
    overlay.remove();
    // 🛑 ELIMINAMOS EL RESET DE AQUÍ. El toast solo debe mostrar el mensaje.
    console.log("✅ Toast cerrado: " + msg);
  }, 4500);
}

function enviarCargaDemanda(event, origen = "directo") {
  if (event) event.preventDefault();

  console.log(`🚀 enviarCargaDemanda ejecutado [${origen}]`);

  const form = document.getElementById("formCargaDemanda");
  const data = {};

[...form.elements].forEach(el => {
    if (!el.name) return;
    if (el.type === "radio") {
      if (el.checked) data[el.name] = el.value;
      return;
    }
    // Si es un checkbox, guardamos si está marcado o no
    if (el.type === "checkbox") {
      data[el.name] = el.checked;
      return;
    }
    data[el.name] = el.value;
  });

  // 🔹 Normalizaciones y validaciones aquí dentro
  const camposTextoNombrePropio = ["nombrecontacto", "cliente", "calle", "edificio", "piso", "local", "ciudad", "sector", "cono", "direccioninstalacion", "observacionventas"];
  camposTextoNombrePropio.forEach(k => { if (k in data) data[k] = toNombrePropio(data[k]); });

  if ("correo" in data) {
    const valid = validarEmailNoCantv(data["correo"]);
    if (!valid) {
      const emailError = document.querySelector('.campo.email .email-error');
      if (emailError) { emailError.style.display = "block"; emailError.textContent = "No se permite dominio @cantv"; }
      return mostrarError("Correo inválido o dominio cantv no permitido");
    }
    data["correo"] = valid;
  }

    if ("cedula" in data) {
      const clean = (data["cedula"] || "").replace(/\D/g, "");
      if (clean.length < 7 || clean.length > 8) return mostrarError("Cédula debe tener 7 u 8 dígitos");
      data["cedula"] = clean;
    }

    ["telefono", "telefono2", "telefono3"].forEach(name => {
      if (name in data && data[name]) {
        const clean = (data[name] || "").replace(/\D/g, "");
        if (clean.length !== 7) return mostrarError(`${name} debe tener exactamente 7 dígitos`);
        data[name] = clean;
      }
    });

    // --- 🔍 SECCIÓN DE DEPURACIÓN RIF ---
      console.log("1. Captura inicial RIF:", { tipo: data["rif_tipo"], num: data["rif_numero"] });

      if (data["rif_tipo"] && data["rif_numero"]) {
        data["rif"] = data["rif_tipo"] + data["rif_numero"];
        console.log("2. RIF Concatenado:", data["rif"]);
      }

      if ("rif" in data) {
        const rifValidado = normalizarRIF(data["rif"]);
        console.log("3. Resultado de normalizarRIF:", rifValidado);
        
        if (!rifValidado) {
          return mostrarError("RIF inválido (Formato: J/V/E + 9 dígitos)");
        }
        data["rif"] = rifValidado;
      }

    if ("montopago" in data) data["montopago"] = formatearMonto(data["montopago"]);
    else data["montopago"] = "0,00";

    // Concatenar COD + TEL (ya tienes la lógica)
    const concatMap = [
      { cod: "cod", tel: "telefono", out: "telefono" },
      { cod: "cod2", tel: "telefono2", out: "telefono2" },
      { cod: "cod3", tel: "telefono3", out: "telefono3" }
    ];
    for (const { cod, tel, out } of concatMap) {
      if (data[cod] && data[tel]) {
        const comb = concatCodTelefono(data[cod], data[tel]);
        if (!comb) return mostrarError(`Concatenación inválida: ${cod} + ${tel}`);
        data[out] = comb;
      }
    }

// 🔍 LOG FINAL ANTES DEL SERVIDOR
  console.log("4. 🧾 OBJETO FINAL que sale al servidor:", data);

  google.script.run
    .withSuccessHandler(function(res) {
      console.log("✅ Respuesta servidor:", res);
      
      if (!res.ok) {
        mostrarErrorCampo(res.campo, res.mensaje);
        return;
      }

      // 1. Mostramos el mensaje de éxito
      mostrarToast("Demanda cargada con éxito", "success");

      // 2. 🚀 EL RESET: Solo ocurre aquí, cuando se guardó de verdad.
      // Esperamos 1.5 segundos para que el usuario vea el toast antes de que se limpie.
      setTimeout(() => {
        console.log("🧹 Limpiando formulario tras guardado exitoso...");
        if (typeof window.reInicializarFormulario === "function") {
          window.reInicializarFormulario();
        } else {
          // Si por alguna razón la función global falla, usamos el reset nativo
          document.getElementById("formCargaDemanda").reset();
        }
      }, 1500); 
    })
    .withFailureHandler(function(err) {
      console.error("❌ Error servidor:", err);
      mostrarToast("Error guardando demanda", "error");
    })
    .cargarDemanda(data);
}

function mostrarError(msg) {
  console.error("❌ [VALIDACIÓN]", msg);
  mostrarToast(msg, "error");
}

// ✅ NUEVA FUNCIÓN — muestra el error debajo del input correcto
function mostrarErrorCampo(campo, mensaje) {
  // ✅ Busca por ID o por NAME
  const input = document.getElementById(campo) 
              || document.querySelector(`[name="${campo}"]`);

  if (!input) {
    console.warn("No se encontró el campo:", campo);
    return;
  }

  // ✅ Busca el <span class="estado"> dentro del mismo contenedor
  const estado = input.parentElement.querySelector(".estado");
  if (!estado) return;

  // ✅ Aplica estilos y mensaje
  estado.className = "estado invalido";
  estado.style.color = "red";
  estado.style.fontSize = "11px";
  estado.innerHTML = mensaje;

  input.classList.add("invalido");
  input.classList.remove("valido");
}

// ============================
  // 🧱 CONSTRUCTORES DE CAMPOS  (Conservé tu estructura y comentarios; sólo ajusté lo necesario)

  function crearCampoTexto(labelText, name, required) {
    const wrap = document.createElement("div");
    wrap.className = "campo texto";
    wrap.innerHTML = `
      <!-- 🔹 Campo TEXTO: ${labelText} -->
      <label for="${name}">${labelText}${required ? " *" : ""}</label>
      <input type="text" id="${name}" name="${name}" ${required ? "required" : ""} />
      <span class="estado"></span>
      <div class="error help" style="display:none;"></div>
    `;

    const input = wrap.querySelector(`#${name}`);
    const estado = wrap.querySelector(".estado");
    const errorBox = wrap.querySelector(".error");

    function validar() {
      const val = input.value; // permitimos espacios en todos los campos texto
      if (val.trim().length > 0) {
        // Mantener capitalización pero permitir espacios
        input.value = toNombrePropio(val);
        input.classList.add("valido"); input.classList.remove("invalido");
        estado.className = "estado valido"; estado.innerHTML = ""; // icon via CSS
        if (errorBox) { errorBox.style.display = "none"; errorBox.textContent = ""; }
      } else {
        input.classList.add("invalido"); input.classList.remove("valido");
        estado.className = "estado invalido"; estado.innerHTML = "";
      }
    }

    input.addEventListener("blur", validar);
    input.addEventListener("input", validar);

    return wrap;
  }

  function crearCampoNumero(labelText, name, required, opts = {}) {
    const wrap = document.createElement("div");
    wrap.className = "campo numero";
    wrap.innerHTML = `
      <!-- 🔹 Campo NÚMERO: ${labelText} -->
      <label for="${name}">${labelText}${required ? " *" : ""}</label>
      <input type="text" inputmode="numeric" id="${name}" name="${name}" ${required ? "required" : ""} />
      <span class="estado"></span>
    `;
    const input = wrap.querySelector(`#${name}`);
    const estado = wrap.querySelector(".estado");

    function validar() {
      const clean = (input.value || "").replace(/\D/g, "");
      const minLen = opts.minLen || 0;
      const maxLen = opts.maxLen || Infinity;
      if (clean.length >= minLen && clean.length <= maxLen && clean.length > 0) {
        input.classList.add("valido"); input.classList.remove("invalido");
        estado.className = "estado valido"; estado.innerHTML = "";
      } else {
        input.classList.add("invalido"); input.classList.remove("valido");
        estado.className = "estado invalido"; estado.innerHTML = "";
      }
    }

    input.addEventListener("input", validar);
    input.addEventListener("blur", validar);

    return wrap;
  }

  function crearCampoTelefono(labelText, name, required, codFieldName) {
    const wrap = document.createElement("div");
    wrap.className = "campo telefono";

    // Si no es requerido, mostrar "(opcional)" junto al label
    const labelTextFinal = required ? labelText : `${labelText} (opcional)`;

    // Render: Select COD + Input Teléfono en la misma fila (span.estado fuera del wrapper)
    wrap.innerHTML = `
      <!-- 🔹 Campo TELÉFONO: ${labelTextFinal} (COD + 7 dígitos) -->
      <label for="${name}">${labelText}${required ? " *" : ""}</label>
      <div class="telefono-group">
        <select id="${codFieldName}" name="${codFieldName}">
          <option value="">COD</option>
          <!-- opciones se llenan desde poblarListasGlobales() -->
        </select>
        <input type="text" inputmode="numeric" id="${name}" name="${name}" ${required ? "required" : ""} placeholder="7 dígitos" />
      </div>
      <span class="estado"></span>
    `;

    const input = wrap.querySelector(`#${name}`);
    const select = wrap.querySelector(`#${codFieldName}`);
    const estado = wrap.querySelector(".estado");
    const telefonoWrapper = wrap.querySelector('.telefono-group');

    function validar() {
      const tel = (input.value || "").replace(/\D/g, "");
      const cod = select.value;
      if (cod && tel.length === 7) {
        input.classList.add("valido"); input.classList.remove("invalido");
        estado.className = "estado valido"; estado.innerHTML = "";
        if (telefonoWrapper) { telefonoWrapper.classList.add("valido"); telefonoWrapper.classList.remove("invalido"); }
      } else {
        input.classList.add("invalido"); input.classList.remove("valido");
        estado.className = "estado invalido"; estado.innerHTML = "";
        if (telefonoWrapper) { telefonoWrapper.classList.add("invalido"); telefonoWrapper.classList.remove("valido"); }
      }
    }

    input.addEventListener("input", validar);
    input.addEventListener("blur", validar);
    select.addEventListener("change", validar);

    return wrap;
  }

        <input type="text" inputmode="numeric" id="${name}_numero" name="${name}_numero" ${required ? "required" : ""} placeholder="9 dígitos" />
      </div>
      <span class="estado"></span>
    `;

    const select = wrap.querySelector(`#${name}_tipo`);
    const input = wrap.querySelector(`#${name}_numero`);
    const estado = wrap.querySelector(".estado");
    
    // 🛑 CAMBIO 2: Agregamos el wrapper para que el borde se pinte de rojo/verde
    const telefonoWrapper = wrap.querySelector('.telefono-group');

    // 📥 Poblado dinámico desde ListasFijas (Excel)
    if (listaRif && Array.isArray(listaRif)) {
      listaRif.forEach(letra => {
        const opt = document.createElement("option");
        opt.value = letra;
        opt.textContent = letra;
        select.appendChild(opt);
      });
    }

    function validar() {
      const rifNum = (input.value || "").replace(/\D/g, "");
      const tipo = select.value;
      if (tipo && rifNum.length === 9) {
        input.classList.add("valido"); input.classList.remove("invalido");
        estado.className = "estado valido"; estado.innerHTML = "";
        // 🛑 Copiado del teléfono: Pinta el borde verde
        if (telefonoWrapper) { telefonoWrapper.classList.add("valido"); telefonoWrapper.classList.remove("invalido"); }
      } else {
        input.classList.add("invalido"); input.classList.remove("valido");
        estado.className = "estado invalido"; estado.innerHTML = "";
        // 🛑 Copiado del teléfono: Pinta el borde rojo
        if (telefonoWrapper) { telefonoWrapper.classList.add("invalido"); telefonoWrapper.classList.remove("valido"); }
      }
    }

    input.addEventListener("input", validar);
    select.addEventListener("change", validar);

// ==========================================
    // 🔍 LÓGICA DEL CHECKBOX: AUTO-RELLENAR (Versión Nativa + Loader)
    // ==========================================
    
    // 👇 Estas dos líneas son vitales y seguro se borraron al pegar 👇
    const checkboxInfo = wrap.querySelector("#usar_info_cliente");
    const labelCheckbox = wrap.querySelector('label[for="usar_info_cliente"]');
    
    checkboxInfo.addEventListener("change", async function() {
      // Limpiamos errores previos del navegador siempre
      select.setCustomValidity("");
      input.setCustomValidity("");

      if (this.checked) {
        // Capturamos los valores actuales justo al hacer clic
        const valorTipo = select.value;
        const valorNumero = input.value.trim().replace(/\D/g, "");

        // 1️⃣ VALIDACIÓN: Si falta algo, lanzamos la burbuja nativa
        if (!valorTipo || valorNumero.length !== 9) {
          this.checked = false; 
          const campoDestino = !valorTipo ? select : input;
          campoDestino.setCustomValidity("Por favor, ingresa el RIF completo (Letra y 9 dígitos)");
          campoDestino.reportValidity(); 
          return;
        }

        // 2️⃣ ACTIVAMOS TU LOADER DE PANTALLA COMPLETA
        if (typeof mostrarLoader === "function") mostrarLoader();

        const rifAEnviar = valorTipo + valorNumero;
        console.log("📡 [FRONTEND] Enviando a buscar este RIF:", rifAEnviar);

        // 3️⃣ LLAMADA AL SERVIDOR
        google.script.run
          .withSuccessHandler(async (res) => { 
            // Manejo de errores o RIF no encontrado
            if (res && res.error) {
              if (typeof ocultarLoader === "function") ocultarLoader();
              mostrarToast(res.error, "error");
              checkboxInfo.checked = false;
              return;
            } else if (!res) {
              if (typeof ocultarLoader === "function") ocultarLoader();
              mostrarToast("No se encontró información para este RIF", "error");
              checkboxInfo.checked = false;
              return;
            }

            // ⏳ Esperamos pacientemente a que la cascada milimétrica termine
            await llenarFormularioCliente(res); 

            // ✅ Todo listo, ocultamos el Loader
            if (typeof ocultarLoader === "function") ocultarLoader();
          })
          .withFailureHandler((err) => {
            console.error("❌ [FRONTEND] Error crítico:", err);
            if (typeof ocultarLoader === "function") ocultarLoader();
            mostrarToast("Error en la búsqueda", "error");
            checkboxInfo.checked = false;
          })
          .buscarClientePorRIF(rifAEnviar);

      } else {
        // 4️⃣ CASO DESMARCADO: Limpiamos los datos
        limpiarDatosPorUncheck();
      }
    });

    return wrap;
  }

  function crearCampoEmail(labelText, name, required) {
    const wrap = document.createElement("div");
    wrap.className = "campo email";
    wrap.innerHTML = `
      <!-- 🔹 Campo EMAIL: ${labelText} (prohibido dominio cantv) -->
      <label for="${name}">${labelText}${required ? " *" : ""}</label>
      <input type="email" id="${name}" name="${name}" ${required ? "required" : ""} />
      <span class="estado"></span>
      <div class="error email-error" style="display:none;"></div>
    `;

    const input = wrap.querySelector(`#${name}`);
    const estado = wrap.querySelector(".estado");
    const emailError = wrap.querySelector(".email-error");

    function validar() {
      const val = input.value.trim();
      if (!val) {
        input.classList.remove("valido"); input.classList.remove("invalido");
        estado.className = "estado"; estado.innerHTML = "";
        if (emailError) { emailError.style.display = "none"; emailError.textContent = ""; }
        return;
      }
      const basic = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!basic.test(val)) {
        input.classList.add("invalido"); input.classList.remove("valido");
        estado.className = "estado invalido"; estado.innerHTML = "";
        if (emailError) { emailError.style.display = "block"; emailError.textContent = "Correo inválido"; }
        return;
      }
      if (/@cantv(\.com)?\.ve$/i.test(val)) {
        input.classList.add("invalido"); input.classList.remove("valido");
        estado.className = "estado invalido"; estado.innerHTML = "";
        if (emailError) { emailError.style.display = "block"; emailError.textContent = "No se permite dominio @cantv"; }
        return;
      }
      input.classList.add("valido"); input.classList.remove("invalido");
      estado.className = "estado valido"; estado.innerHTML = "";
      if (emailError) { emailError.style.display = "none"; emailError.textContent = ""; }
    }

    input.addEventListener("input", validar);
    input.addEventListener("blur", validar);

    return wrap;
  }

  function crearCampoDate(labelText, name, required) {
    const wrap = document.createElement("div");
    wrap.className = "campo date";
    wrap.innerHTML = `
      <!-- 🔹 Campo DATE: ${labelText} (dd/mm/aaaa, zona horaria Caracas) -->
      <label for="${name}">${labelText}${required ? " *" : ""}</label>

    `;

    const input = wrap.querySelector(`#${name}`);
    const estado = wrap.querySelector(".estado");

    function validar() {
      const val = input.value;

      // ✅ Si hay valor → normaliza y limpia error
      if (val) {
        const fecha = new Date(val);
        const dia = String(fecha.getDate()).padStart(2, "0");
        const mes = String(fecha.getMonth() + 1).padStart(2, "0");
        const anio = fecha.getFullYear();

        input.dataset.normalizado = `${dia}/${mes}/${anio}`;
        input.classList.add("valido");
        input.classList.remove("invalido");

        estado.className = "estado valido";
        estado.innerHTML = ""; // ✅ limpia mensaje
      } 
      // ✅ Si NO hay valor → marca error visual
      else {
        input.classList.add("invalido");
        input.classList.remove("valido");

        estado.className = "estado invalido";
        estado.style.color = "red";
        estado.style.fontSize = "11px";
        estado.innerHTML = "Este campo es obligatorio"; // ✅ mensaje debajo del input
      }
    }

    input.addEventListener("change", validar);
    input.addEventListener("blur", validar);

    return wrap;
}

    // ============================================================

    // Deja un <select> vacío con la opción inicial "Seleccione..."
    function limpiarSelect(sel) {
      if (!sel) return;
      sel.innerHTML = `<option value="">Seleccione...</option>`;
    }

    // ============================================================
    // ✍️ UTILIDAD: POBLAR SELECT
    // ============================================================
    // Recibe un elemento <select> y un arreglo de opciones, y lo llena
    function poblarSelect(sel, opciones) {
      if (!sel) return;
      
      // Verifica que opciones sea un arreglo válido, si no, lo deja vacío
      if (!Array.isArray(opciones) || opciones.length === 0) {
        limpiarSelect(sel);
        return;
      }

      // Mapea el arreglo de opciones a etiquetas <option> de HTML
      sel.innerHTML = `<option value="">Seleccione...</option>` + 
        opciones.map(opt => `<option value="${opt}">${opt}</option>`).join("");
    }

    // ============================================================
    function enlazarOfertaAceptada() {
      const radios = document.querySelectorAll('input[name="ofertaaceptada"]');
      if (!radios || radios.length === 0) return;

      const motivo = document.getElementById("motivonoaceptacion");
      const fecha = document.getElementById("fechaaceptacion");
      const aceptpor = document.getElementById("aceptacionrecibidapor");

      // 🔹 Función auxiliar para resetear campo y validadores
      function resetField(el) {
        if (!el) return;
        el.value = "";
        el.classList.remove("is-valid", "is-invalid");
        el.removeAttribute("aria-invalid");
        el.style.borderColor = "";
        el.style.boxShadow = "";
      }

      function toggle() {
        const val = Array.from(radios).find(r => r.checked)?.value;
        console.log("🔄 Cambio en Oferta Aceptada:", val);

        if (!val) return;

        if (val.toLowerCase() === "no") {
          if (motivo) motivo.closest('.campo').style.display = "";
          if (fecha) {
            fecha.closest('.campo').style.display = "none";
            resetField(fecha); // 🔹 limpiar y resetear validadores
          }
          if (aceptpor) {
            aceptpor.closest('.campo').style.display = "none";
            resetField(aceptpor); // 🔹 limpiar y resetear validadores
          }
        } else {
          if (fecha) fecha.closest('.campo').style.display = "";
          if (aceptpor) aceptpor.closest('.campo').style.display = "";
          if (motivo) {
            motivo.closest('.campo').style.display = "none";
            resetField(motivo); // 🔹 limpiar y resetear validadores
          }
        }
      }

      radios.forEach(r => r.addEventListener('change', toggle));

      // 🔹 Ocultar todos al inicio
      if (motivo) motivo.closest('.campo').style.display = "none";
      if (fecha) fecha.closest('.campo').style.display = "none";
      if (aceptpor) aceptpor.closest('.campo').style.display = "none";
    }

function limpiarDatosPorUncheck() {
  console.log("🧹 Checkbox desmarcado: Limpiando información de Cliente y Personal...");

  // 1. Mapa exacto de campos a limpiar según tu instrucción
  const camposCliente = ["cliente", "calle", "edificio", "piso", "local", "region", "estado", "municipio", "gerenteregion", "ciudad", "sector", "cono", "huella"];
  const camposPersonal = ["nombrecontacto", "cedula", "correo", "cod", "telefono", "cod2", "telefono2", "cod3", "telefono3"];
  
  const todosLosCampos = [...camposCliente, ...camposPersonal];

  todosLosCampos.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.value = ""; // Vaciamos el valor
      el.classList.remove("valido"); // Quitamos el borde verde si lo tiene
    }
  });

  // 2. Disparamos el 'change' en Región para que limpie en cascada los Estados y Municipios
  const regionSel = document.getElementById("region");
  if (regionSel) regionSel.dispatchEvent(new Event('change'));
}

  // Función auxiliar para esperar a que un select tenga la opción disponible (Milimétrica)
async function esperarYSetearSelect(id, valor, intentosMax = 50) {
  const el = document.getElementById(id);
  if (!el || !valor) return;

  for (let i = 0; i < intentosMax; i++) {
    const existe = Array.from(el.options).some(opt => opt.value === valor);
    if (existe) {
      el.value = valor;
      el.dispatchEvent(new Event('change')); // Disparamos el siguiente nivel de la cascada
      console.log(`✅ [PROCESADO] ${id} fijado en: ${valor}`);
      return;
    }
    // Esperamos 100ms antes del siguiente intento
    await new Promise(resolve => setTimeout(resolve, 100));
  }
  console.warn(`⚠️ [TIMEOUT] No se encontró '${valor}' en el select '${id}'`);
}

// LA FUNCIÓN MAESTRA
async function llenarFormularioCliente(datos) {
  if (!datos) return;
  console.log("🚀 Iniciando Rellenado Milimétrico...", datos);

  // 1. Grupo Cliente e Información General (Mapeo 1:1)
  const camposSimples = [
    "cliente", "calle", "edificio", "piso", "local", "ciudad", 
    "sector", "cono", "huella", "direccioninstalacion", "observacionventas"
  ];
  
  // 2. Grupo Personal (Incluye Cédula y Correo)
  const camposPersonal = ["nombrecontacto", "cedula", "correo"];
  
  [...camposSimples, ...camposPersonal].forEach(id => {
    const el = document.getElementById(id);
    if (el && datos[id] !== undefined) {
      el.value = datos[id];
      el.classList.add("valido");
    }
  });

  // 3. REGLA DE TELÉFONOS (3 para COD, 7 para Número)
  const tels = [
    { num: "telefono", cod: "cod" },
    { num: "telefono2", cod: "cod2" },
    { num: "telefono3", cod: "cod3" }
  ];

  tels.forEach(t => {
    let val = (datos[t.num] || "").toString().replace(/\D/g, "");
    if (val.length >= 10) {
      const elCod = document.getElementById(t.cod);
      const elNum = document.getElementById(t.num);
      
      const parteCod = val.slice(0, 3); // Los 3 primeros
      const parteNum = val.slice(3, 10); // Los 7 restantes
      
      // Intentamos poner el COD (con y sin el 0 inicial por si acaso)
      if (elCod) {
        elCod.value = "0" + parteCod; 
        if (!elCod.value) elCod.value = parteCod; // Backup si tu select no usa el 0
      }
      if (elNum) elNum.value = parteNum;
    }
  });

  // 4. CASCADA INTELIGENTE (Región -> Estado -> Municipio/Gerente)
  const regionSel = document.getElementById("region");
  if (regionSel && datos["region"]) {
    regionSel.value = datos["region"];
    console.log("📍 Seteando Región...");
    regionSel.dispatchEvent(new Event('change'));

    // Esperamos a que los ESTADOS carguen
    await esperarYSetearSelect("estado", datos["estado"]);
    
    // Esperamos a que los MUNICIPIOS y GERENTES carguen
    await esperarYSetearSelect("municipio", datos["municipio"]);
    await esperarYSetearSelect("gerenteregion", datos["gerenteregion"]);
  }
}
